apiVersion: v1
kind: Secret
metadata:
  name: bank-secret
type: Opaque
data:
  # Values must be base64-encoded
  # Example: echo -n 'your-username' | base64
  DB_USERNAME: <base64-encoded-username>
  DB_PASSWORD: <base64-encoded-password>

# NOTE: Do not commit real credentials here.
# In production, use an external secrets manager such as:
# - AWS Secrets Manager + External Secrets Operator
# - HashiCorp Vault
# - Kubernetes sealed-secrets
# and inject values at deploy time via your CI/CD pipeline.
